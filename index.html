<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Precios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f2f5;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .login-card .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-card .brand svg {
      display: block;
      margin: 0 auto 12px;
    }

    .login-card .brand h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .login-card .brand p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #0078d4;
      box-shadow: 0 0 0 3px rgba(0,120,212,0.12);
    }

    #error-msg {
      display: none;
      font-size: 13px;
      color: #c0392b;
      background: #fdf0ef;
      border: 1px solid #f5c6c3;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 1rem;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #006abc; }
    .btn-login:active { background: #005a9e; }

    /* ── DASHBOARD ── */
    #dashboard {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .user-info span {
      font-size: 13px;
      color: #555;
    }

    .btn-logout {
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: transparent;
      color: #444;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-logout:hover { background: #f5f5f5; }

    .report-container {
      flex: 1;
      padding: 1.5rem;
    }

    .report-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      background: #fff;
    }

    .report-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="brand">
        <!-- Power BI icon -->
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="#F2C811"/>
          <rect x="8" y="22" width="5" height="12" rx="1.5" fill="#1a1a1a" opacity="0.75"/>
          <rect x="15.5" y="16" width="5" height="18" rx="1.5" fill="#1a1a1a" opacity="0.85"/>
          <rect x="23" y="10" width="5" height="24" rx="1.5" fill="#1a1a1a"/>
        </svg>
        <h1>Control Precios</h1>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <div id="error-msg">Usuario o contraseña incorrectos.</div>

      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="Tu usuario" autocomplete="off" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" />
      </div>

      <button class="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <div class="title">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="#F2C811"/>
          <rect x="8" y="22" width="5" height="12" rx="1.5" fill="#1a1a1a" opacity="0.75"/>
          <rect x="15.5" y="16" width="5" height="18" rx="1.5" fill="#1a1a1a" opacity="0.85"/>
          <rect x="23" y="10" width="5" height="24" rx="1.5" fill="#1a1a1a"/>
        </svg>
        Control Precios
      </div>
      <div class="user-info">
        <span id="welcome-name"></span>
        <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </header>

    <div class="report-container">
      <div class="report-wrapper">
        <iframe
          title="CONTROL PRECIOS"
          src="https://app.powerbi.com/view?r=eyJrIjoiY2U5ODkyZGUtODZhYS00MzM1LWEzMzAtMDA3NmMzNjExMTI1IiwidCI6Ijk0MDJiMWZkLTJkMjUtNGMxYS04YzQwLWJiY2ViNTJhNDU5OCIsImMiOjR9"
          allowfullscreen="true">
        </iframe>
      </div>
    </div>
  </div>

  <script>
    const USERS = {
      "Miguel123": "123456"
    };

    function doLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err  = document.getElementById('error-msg');

      if (USERS[user] && USERS[user] === pass) {
        err.style.display = 'none';
        sessionStorage.setItem('auth_user', user);
        showDashboard(user);
      } else {
        err.style.display = 'block';
        document.getElementById('password').value = '';
      }
    }

    function doLogout() {
      sessionStorage.removeItem('auth_user');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    function showDashboard(user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      document.getElementById('welcome-name').textContent = 'Hola, ' + user;
    }

    // Bloquear acceso directo si no hay sesión
    window.addEventListener('load', function() {
      const stored = sessionStorage.getItem('auth_user');
      if (stored && USERS[stored]) {
        showDashboard(stored);
      }
    });

    // Enter para hacer login
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
